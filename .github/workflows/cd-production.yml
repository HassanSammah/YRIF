name: CD – Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # NEVER cancel an in-flight production deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Build & push images ────────────────────────────────────────────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: ci
    environment: production   # manual approval gate configured in GitHub Settings

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    outputs:
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Backend image metadata
        id: be-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.be-meta.outputs.tags }}
          labels: ${{ steps.be-meta.outputs.labels }}
          build-args: |
            SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Frontend image metadata
        id: fe-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.fe-meta.outputs.tags }}
          labels: ${{ steps.fe-meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_API_BASE_URL }}
            VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          PROD_SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_BRIQ_API_KEY: ${{ secrets.PROD_BRIQ_API_KEY }}
          PROD_BRIQ_APP_KEY: ${{ secrets.PROD_BRIQ_APP_KEY }}
          PROD_BREVO_API_KEY: ${{ secrets.PROD_BREVO_API_KEY }}
          PROD_SARUFI_BOT_ID: ${{ secrets.PROD_SARUFI_BOT_ID }}
          PROD_SARUFI_API_KEY: ${{ secrets.PROD_SARUFI_API_KEY }}
          PROD_GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          PROD_ALLOWED_HOSTS: ${{ secrets.PROD_ALLOWED_HOSTS }}
          PROD_CORS_ALLOWED_ORIGINS: ${{ secrets.PROD_CORS_ALLOWED_ORIGINS }}
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: root
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          envs: PROD_SECRET_KEY,PROD_DB_NAME,PROD_DB_USER,PROD_DB_PASSWORD,PROD_BRIQ_API_KEY,PROD_BRIQ_APP_KEY,PROD_BREVO_API_KEY,PROD_SARUFI_BOT_ID,PROD_SARUFI_API_KEY,PROD_GOOGLE_CLIENT_ID,PROD_SUPABASE_URL,PROD_SUPABASE_ANON_KEY,PROD_ALLOWED_HOSTS,PROD_CORS_ALLOWED_ORIGINS,PROD_API_BASE_URL
          script: |
            set -e
            cd /var/www/yrif

            echo "--- Syncing .env.production ---"
            _uenv() {
              local k="$1" v="$2" f="backend/.env.production"
              touch "$f"
              if grep -q "^${k}=" "$f" 2>/dev/null; then
                sed -i "s|^${k}=.*|${k}=${v}|" "$f"
              else
                echo "${k}=${v}" >> "$f"
              fi
            }
            _uenv SECRET_KEY          "$PROD_SECRET_KEY"
            _uenv DB_NAME             "$PROD_DB_NAME"
            _uenv DB_USER             "$PROD_DB_USER"
            _uenv DB_PASSWORD         "$PROD_DB_PASSWORD"
            _uenv DB_HOST             "db"
            _uenv DB_PORT             "5432"
            _uenv REDIS_URL           "redis://redis:6379/0"
            _uenv BRIQ_API_KEY        "$PROD_BRIQ_API_KEY"
            _uenv BRIQ_APP_KEY        "$PROD_BRIQ_APP_KEY"
            _uenv BREVO_API_KEY       "$PROD_BREVO_API_KEY"
            _uenv SARUFI_BOT_ID       "$PROD_SARUFI_BOT_ID"
            _uenv SARUFI_API_KEY      "$PROD_SARUFI_API_KEY"
            _uenv GOOGLE_CLIENT_ID    "$PROD_GOOGLE_CLIENT_ID"
            _uenv SUPABASE_URL        "$PROD_SUPABASE_URL"
            _uenv SUPABASE_KEY        "$PROD_SUPABASE_ANON_KEY"
            _uenv ALLOWED_HOSTS       "$PROD_ALLOWED_HOSTS"
            _uenv CORS_ALLOWED_ORIGINS "$PROD_CORS_ALLOWED_ORIGINS"
            _uenv DEFAULT_FROM_EMAIL  "noreply@yriftz.org"
            _uenv CONTACT_EMAIL       "info@yriftz.org"

            echo "--- Pulling latest code ---"
            git pull origin main
            echo "--- Pulling new Docker images ---"
            docker compose -f docker-compose.prod.yml pull
            echo "--- Restarting containers ---"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "--- Running migrations ---"
            for i in $(seq 1 12); do
              if docker exec yrif-backend-1 python manage.py check --deploy 2>/dev/null; then
                break
              fi
              echo "Waiting for backend ($i/12)..."
              sleep 5
            done
            docker exec yrif-backend-1 python manage.py migrate --no-input
            echo "--- Deploy complete ---"

      - name: Health check (production)
        run: |
          echo "Waiting 30s for deployment to settle..."
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 \
              "http://${{ secrets.PROD_SSH_HOST }}/health/")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Production health check failed after 5 attempts."
          exit 1

      - name: Notify on success
        if: success()
        run: echo "Production deploy succeeded for ${{ github.sha }} by ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: echo "::error::PRODUCTION deploy FAILED for ${{ github.sha }} by ${{ github.actor }}"
