name: CD – Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true   # cancel any in-flight staging deploy when a new one starts

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Build & push images ────────────────────────────────────────────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Backend image metadata
        id: be-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.be-meta.outputs.tags }}
          labels: ${{ steps.be-meta.outputs.labels }}
          build-args: |
            SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Frontend image metadata
        id: fe-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.fe-meta.outputs.tags }}
          labels: ${{ steps.fe-meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}
            VITE_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Deploy via SSH
        # Only deploy if staging SSH secrets are configured
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /var/www/yrif
            git pull origin staging
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            for i in $(seq 1 12); do
              if docker exec yrif-backend-1 python manage.py check 2>/dev/null; then
                break
              fi
              sleep 5
            done
            docker exec yrif-backend-1 python manage.py migrate --no-input

      - name: Skip deploy (no staging server configured)
        if: ${{ secrets.STAGING_SSH_HOST == '' || secrets.STAGING_SSH_KEY == '' }}
        run: echo "::notice::STAGING_SSH_HOST or STAGING_SSH_KEY not set — skipping deploy. Images were built and pushed to GHCR."

      - name: Health check (staging)
        if: ${{ secrets.STAGING_SSH_HOST != '' && secrets.STAGING_API_BASE_URL != '' }}
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "${{ secrets.STAGING_API_BASE_URL }}/health/")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Staging health check failed."
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deploy FAILED for ${{ github.sha }} on ${{ github.ref_name }}"
