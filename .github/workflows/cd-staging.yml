name: CD – Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements/production.txt

      # ── Frontend ─────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: npm run build
        working-directory: frontend

      # ── Deploy ───────────────────────────────────────────────────
      # Replace this step with your actual deployment command.
      # Examples: Railway CLI, Render deploy hook, SSH + rsync, Docker push.
      - name: Deploy to staging server
        env:
          STAGING_DEPLOY_HOOK: ${{ secrets.STAGING_DEPLOY_HOOK }}
        run: |
          echo "Deploying commit ${{ github.sha }} to staging..."
          # TODO: add your deploy command here, e.g.:
          # curl -X POST "$STAGING_DEPLOY_HOOK"
          echo "Deploy step placeholder – configure STAGING_DEPLOY_HOOK secret."
