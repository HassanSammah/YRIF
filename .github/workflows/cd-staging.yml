name: CD – Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true   # cancel any in-flight staging deploy when a new one starts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Build & push images ────────────────────────────────────────────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: ci
    environment: staging

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──────────────────────────────────────────────────────
      - name: Backend image metadata
        id: be-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.be-meta.outputs.tags }}
          labels: ${{ steps.be-meta.outputs.labels }}
          build-args: |
            SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ─────────────────────────────────────────────────────
      - name: Frontend image metadata
        id: fe-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yrif-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.fe-meta.outputs.tags }}
          labels: ${{ steps.fe-meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}
            VITE_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Check staging SSH config
        id: check
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          API_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          if [[ -n "$SSH_HOST" && -n "$SSH_KEY" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::STAGING_SSH_HOST or STAGING_SSH_KEY not set — skipping deploy. Images were pushed to GHCR."
          fi
          echo "healthcheck=$([[ -n "$SSH_HOST" && -n "$API_URL" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        if: steps.check.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        env:
          STAGING_SECRET_KEY: ${{ secrets.STAGING_SECRET_KEY }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_BRIQ_API_KEY: ${{ secrets.STAGING_BRIQ_API_KEY }}
          STAGING_BRIQ_APP_KEY: ${{ secrets.STAGING_BRIQ_APP_KEY }}
          STAGING_BREVO_API_KEY: ${{ secrets.STAGING_BREVO_API_KEY }}
          STAGING_ANTHROPIC_API_KEY: ${{ secrets.STAGING_ANTHROPIC_API_KEY }}
          STAGING_GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_ALLOWED_HOSTS: ${{ secrets.STAGING_ALLOWED_HOSTS }}
          STAGING_CORS_ALLOWED_ORIGINS: ${{ secrets.STAGING_CORS_ALLOWED_ORIGINS }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: STAGING_SECRET_KEY,STAGING_DB_NAME,STAGING_DB_USER,STAGING_DB_PASSWORD,STAGING_BRIQ_API_KEY,STAGING_BRIQ_APP_KEY,STAGING_BREVO_API_KEY,STAGING_ANTHROPIC_API_KEY,STAGING_GOOGLE_CLIENT_ID,STAGING_SUPABASE_URL,STAGING_SUPABASE_ANON_KEY,STAGING_ALLOWED_HOSTS,STAGING_CORS_ALLOWED_ORIGINS,STAGING_API_BASE_URL
          script: |
            set -e
            cd /var/www/yrif

            echo "--- Syncing .env.production ---"
            _uenv() {
              local k="$1" v="$2" f="backend/.env.production"
              touch "$f"
              if grep -q "^${k}=" "$f" 2>/dev/null; then
                sed -i "s|^${k}=.*|${k}=${v}|" "$f"
              else
                echo "${k}=${v}" >> "$f"
              fi
            }
            _uenv SECRET_KEY          "$STAGING_SECRET_KEY"
            _uenv DB_NAME             "$STAGING_DB_NAME"
            _uenv DB_USER             "$STAGING_DB_USER"
            _uenv DB_PASSWORD         "$STAGING_DB_PASSWORD"
            _uenv DB_HOST             "db"
            _uenv DB_PORT             "5432"
            _uenv REDIS_URL           "redis://redis:6379/0"
            _uenv BRIQ_API_KEY        "$STAGING_BRIQ_API_KEY"
            _uenv BRIQ_APP_KEY        "$STAGING_BRIQ_APP_KEY"
            _uenv BREVO_API_KEY       "$STAGING_BREVO_API_KEY"
            _uenv ANTHROPIC_API_KEY   "$STAGING_ANTHROPIC_API_KEY"
            _uenv GOOGLE_CLIENT_ID    "$STAGING_GOOGLE_CLIENT_ID"
            _uenv SUPABASE_URL        "$STAGING_SUPABASE_URL"
            _uenv SUPABASE_KEY        "$STAGING_SUPABASE_ANON_KEY"
            _uenv ALLOWED_HOSTS       "$STAGING_ALLOWED_HOSTS"
            _uenv CORS_ALLOWED_ORIGINS "$STAGING_CORS_ALLOWED_ORIGINS"
            _uenv DEFAULT_FROM_EMAIL  "noreply@yriftz.org"
            _uenv CONTACT_EMAIL       "info@yriftz.org"

            echo "--- Pulling latest code ---"
            git pull origin staging
            echo "--- Pulling new Docker images ---"
            docker compose -f docker-compose.prod.yml pull
            echo "--- Restarting containers ---"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "--- Running migrations ---"
            for i in $(seq 1 12); do
              if docker exec yrif-backend-1 python manage.py check 2>/dev/null; then
                break
              fi
              echo "Waiting for backend ($i/12)..."
              sleep 5
            done
            docker exec yrif-backend-1 python manage.py migrate --no-input
            echo "--- Deploy complete ---"

      - name: Health check (staging)
        if: steps.check.outputs.healthcheck == 'true'
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              "${{ secrets.STAGING_API_BASE_URL }}/health/")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Staging health check failed."
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deploy FAILED for ${{ github.sha }} on ${{ github.ref_name }}"
