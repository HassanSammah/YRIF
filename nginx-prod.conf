# /etc/nginx/sites-available/yriftz.org
# Generated for YRIF production deployment on Contabo VPS.
# Run certbot AFTER DNS is pointed to 158.220.117.34 to get SSL.
# After certbot, this file is automatically updated.

# HTTP → HTTPS redirect (uncomment after getting cert)
# server {
#     listen 80;
#     server_name yriftz.org www.yriftz.org;
#     return 301 https://yriftz.org$request_uri;
# }

# HTTP server (initial — before SSL cert is issued)
server {
    listen 80;
    server_name yriftz.org www.yriftz.org _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything to the frontend container (React SPA + API proxy)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }
}

